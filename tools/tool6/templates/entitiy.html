<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Name Entity Recognition App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <style>
        /* ==================== PREMIUM MODERN DARK DASHBOARD ==================== */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
    color: #e2e8f0;
    min-height: 100vh;
    padding: 40px 20px;
}

/* Container */
.container {
    max-width: 900px;
    margin: 0 auto;
}

/* Card */
.card {
    background: rgba(255, 255, 255, 0.07);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(96, 165, 250, 0.25);
    transition: all 0.4s ease;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
}

/* Custom Button */
.btn-custom {
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    border: none;
    padding: 16px 32px;
    font-size: 1.15rem;
    font-weight: 700;
    border-radius: 16px;
    color: white;
    cursor: pointer;
    transition: all 0.4s ease;
    box-shadow: 0 10px 30px rgba(96, 165, 250, 0.4);
    width: 100%;
}

.btn-custom:hover {
    transform: translateY(-4px);
    box-shadow: 0 15px 40px rgba(96, 165, 250, 0.6);
    background: linear-gradient(90deg, #2563eb, #3b82f6);
}

/* Output Container */
.output-container {
    margin-top: 35px;
    background: rgba(15, 23, 42, 0.85);
    border-radius: 20px;
    padding: 30px;
    border: 1px solid rgba(148, 163, 184, 0.2);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

/* Pre Code Block */
pre {
    background: #1e2937;
    color: #e0f2fe;
    padding: 24px;
    border-radius: 16px;
    overflow-x: auto;
    border: 1px solid rgba(96, 165, 250, 0.2);
    font-family: 'JetBrains Mono', 'Consolas', monospace;
    font-size: 1.02rem;
    line-height: 1.6;
    box-shadow: inset 0 4px 15px rgba(0, 0, 0, 0.4);
}

/* Responsive */
@media (max-width: 1024px) {
    .container {
        max-width: 85%;
    }
    
    .card {
        padding: 35px 30px;
    }
}

@media (max-width: 768px) {
    .container {
        max-width: 92%;
    }
    
    .card {
        padding: 30px 25px;
    }
}

@media (max-width: 480px) {
    .container {
        max-width: 96%;
    }
    
    .card {
        padding: 25px 20px;
    }
}
    </style>
</head>
<body>

    <div class="container text-center">
        <h1 class="mb-4">🚀 Name Entity Recognition App</h1>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <form action="/tool6/entity" method="post" enctype="multipart/form-data">
                        <div class="form-group mb-3">
                            <label for="file" class="form-label">📂 Upload a file</label>
                            <input type="file" name="file" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-custom w-100">🔍 Get Entities</button>
                    </form>
                </div>
            </div>
        </div>

        {% if html and text %}
        <div class="output-container mt-5">
            <h4>📄 Original Text:</h4>
            <pre>{{ text|safe }}</pre>
            
            <h4>🧠 Named Entities:</h4>
            <div class="mt-3">{{ html|safe }}</div>
        </div>
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
</body>
</html>
