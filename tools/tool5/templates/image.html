<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Uploader</title>
    <style>
      /* ==================== PREMIUM MODERN FORM PAGE ==================== */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
    color: #e2e8f0;
    min-height: 100vh;
    padding: 40px 20px;
}

header {
    background: linear-gradient(135deg, #1e40af, #312e81);
    color: white;
    padding: 2.5rem 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    margin-bottom: 40px;
    border-radius: 0 0 20px 20px;
}

header h1 {
    font-size: 2.6rem;
    font-weight: 800;
    margin: 0;
}

/* Container */
.container {
    max-width: 760px;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    padding: 45px 40px;
    border-radius: 24px;
    box-shadow: 0 25px 70px rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(96, 165, 250, 0.25);
}

/* Headings */
h1, .section-header {
    color: #bae6fd;
    font-weight: 700;
    margin-bottom: 25px;
}

.section-header {
    background: rgba(96, 165, 250, 0.15);
    padding: 14px 20px;
    border-radius: 14px;
    font-size: 1.35rem;
    border-left: 5px solid #60a5fa;
}

/* Form Elements */
form {
    margin-bottom: 30px;
}

label {
    display: block;
    margin-bottom: 10px;
    font-weight: 600;
    color: #c4d0ff;
    font-size: 1.05rem;
}

input[type="text"],
input[type="file"],
textarea {
    width: 100%;
    padding: 16px 20px;
    background: rgba(15, 23, 42, 0.85);
    border: 1px solid rgba(148, 163, 184, 0.4);
    border-radius: 14px;
    color: #e2e8f0;
    font-size: 1.05rem;
    transition: all 0.3s ease;
    margin-bottom: 20px;
}

input[type="text"]:focus,
input[type="file"]:focus,
textarea:focus {
    outline: none;
    border-color: #60a5fa;
    box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
}

/* Button */
button {
    width: 100%;
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    color: white;
    padding: 16px 24px;
    font-size: 1.15rem;
    font-weight: 700;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.4s ease;
    box-shadow: 0 10px 30px rgba(96, 165, 250, 0.4);
}

button:hover {
    transform: translateY(-4px);
    box-shadow: 0 15px 40px rgba(96, 165, 250, 0.6);
    background: linear-gradient(90deg, #2563eb, #3b82f6);
}

/* Responsive */
@media (max-width: 1024px) {
    .container {
        width: 85%;
        padding: 35px 30px;
    }
}

@media (max-width: 768px) {
    .container {
        width: 92%;
        padding: 30px 25px;
    }
    
    header {
        padding: 2rem 15px;
    }
}

@media (max-width: 480px) {
    .container {
        width: 96%;
        padding: 25px 20px;
    }
}
    </style>
</head>
<body>
    <header>
        <h1>Auto Resume Parsing & Auto Form Filling LLM Application</h1>
    </header>
    <div class="container">
        <h2>Upload Resume</h2>
        <form id="resumeForm" action="/tool5/upload_resume" method="post" enctype="multipart/form-data">
            <label for="resume">Resume (PDF only):</label>
            <input type="file" id="resume" name="resume" accept=".pdf" required>
            <button type="submit">Upload</button>
        </form>

        {% if full_name %}
        <h2 class="section-header">Extracted Resume Details</h2>
        <form id="resumeDetailsForm">
            <label for="fullName">Full Name:</label>
<input type="text" id="fullName" name="fullName" value="{{ full_name | default('No Data') }}" readonly><br>

<label for="contactNumber">Contact Number:</label>
<input type="text" id="contactNumber" name="contactNumber" value="{{ contact_number | default('No Data') }}" readonly><br>

<label for="emailAddress">Email Address:</label>
<input type="text" id="emailAddress" name="emailAddress" value="{{ email_address | default('No Data') }}" readonly><br>

<label for="location">Location:</label>
<input type="text" id="location" name="location" value="{{ location | default('No Data') }}" readonly><br>

<label for="technicalSkills">Technical Skills:</label>
<textarea id="technicalSkills" name="technicalSkills" rows="4" readonly>{{ technical_skills | default('No Data') }}</textarea><br>

<label for="nonTechnicalSkills">Non-Technical Skills:</label>
<textarea id="nonTechnicalSkills" name="nonTechnicalSkills" rows="4" readonly>{{ non_technical_skills | default('No Data') }}</textarea><br>

<label for="education">Education:</label>
<textarea id="education" name="education" rows="4" readonly>{{ education | default('No Data') }}</textarea><br>

<label for="workExperience">Work Experience:</label>
<textarea id="workExperience" name="workExperience" rows="4" readonly>{{ work_experience | default('No Data') }}</textarea><br>

<label for="certifications">Certifications:</label>
<textarea id="certifications" name="certifications" rows="4" readonly>{{ certifications | default('No Data') }}</textarea><br>

<label for="languages">Languages:</label>
<textarea id="languages" name="languages" rows="2" readonly>{{ languages | default('No Data') }}</textarea><br>

<label for="suggestedCategory">Suggested Resume Category:</label>
<input type="text" id="suggestedCategory" name="suggestedCategory" value="{{ suggested_resume_category | default('No Data') }}" readonly><br>

<label for="recommendedRoles">Recommended Job Roles:</label>
<textarea id="recommendedRoles" name="recommendedRoles" rows="2" readonly>{{ recommended_job_roles | default('No Data') }}</textarea><br>

                  </form>
        {% endif %}
    </div>
</body>
</html>
