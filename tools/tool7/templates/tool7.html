<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Threat Detector</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js"></script>
    
    <style>
        /* ==================== PREMIUM MODERN SCANNER PAGE ==================== */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a2338 100%);
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 80px;
}

/* Navbar */
.navbar {
    width: 100%;
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(16px);
    padding: 1.4rem 0;
    text-align: center;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1000;
    border-bottom: 1px solid rgba(96, 165, 250, 0.2);
}

.navbar h1 {
    margin: 0;
    font-size: 2.1rem;
    font-weight: 800;
    background: linear-gradient(90deg, #58a6ff, #a5b4fc);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

/* Container */
.container {
    margin-top: 40px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(20px);
    padding: 50px 45px;
    border-radius: 24px;
    width: 90%;
    max-width: 780px;
    box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6);
    border: 1px solid rgba(96, 165, 250, 0.25);
    text-align: center;
}

/* Input */
input {
    width: 100%;
    padding: 18px 24px;
    font-size: 1.1rem;
    border: 2px solid rgba(88, 166, 255, 0.4);
    border-radius: 16px;
    background-color: rgba(30, 35, 48, 0.9);
    color: white;
    margin-bottom: 25px;
    transition: all 0.3s ease;
}

input:focus {
    outline: none;
    border-color: #58a6ff;
    box-shadow: 0 0 0 4px rgba(88, 166, 255, 0.2);
}

/* Button */
button {
    background: linear-gradient(90deg, #238636, #2ea043);
    color: white;
    padding: 16px 32px;
    font-size: 1.15rem;
    font-weight: 700;
    border-radius: 16px;
    cursor: pointer;
    width: 100%;
    transition: all 0.4s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    border: none;
    box-shadow: 0 10px 30px rgba(46, 160, 67, 0.4);
}

button:hover {
    transform: translateY(-4px);
    box-shadow: 0 15px 40px rgba(46, 160, 67, 0.6);
    background: linear-gradient(90deg, #2ea043, #3cb371);
}

button:active {
    transform: scale(0.97);
}

.scan-icon {
    font-size: 1.4rem;
}

/* Spinner */
.spinner {
    display: none;
    margin: 20px auto;
    border: 6px solid rgba(255, 255, 255, 0.1);
    border-top: 6px solid #58a6ff;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Result Box */
.result-box {
    margin-top: 30px;
    padding: 25px;
    border-radius: 16px;
    font-size: 1.15rem;
    background: rgba(15, 23, 42, 0.85);
    border: 1px solid rgba(88, 166, 255, 0.2);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

/* Result Colors */
.benign     { color: #34d399; border-left: 5px solid #34d399; }
.defacement { color: #fbbf24; border-left: 5px solid #fbbf24; }
.malware    { color: #ef4444; border-left: 5px solid #ef4444; }
.phishing   { color: #a855f7; border-left: 5px solid #a855f7; }
.unknown    { color: #94a3b8; border-left: 5px solid #94a3b8; }

/* Responsive */
@media (max-width: 768px) {
    .container {
        padding: 35px 25px;
        width: 92%;
    }
    
    .navbar h1 {
        font-size: 1.8rem;
    }
}

@media (max-width: 480px) {
    .container {
        padding: 30px 20px;
        width: 95%;
    }
}
    </style>

    <script>
        function showSpinner(formId, spinnerId) {
            document.getElementById(spinnerId).style.display = 'block';
        }
    </script>
</head>
<body>

    <div class="navbar">
        <h1><i class="fas fa-shield-alt"></i> ThreatGuard</h1>
    </div>

    <div class="container">
        <h2><i class="fas fa-exclamation-triangle"></i> Malicious Files</h2>
        <form id="fileForm" action="/tool7/scam/" method="post" enctype="multipart/form-data" onsubmit="showSpinner('fileForm', 'fileSpinner')">
            <label for="file"><strong>Upload a file (PDF/TXT only):</strong></label><br>
            <input type="file" name="file" required><br>
            <button type="submit"><i class="fas fa-upload scan-icon"></i> Analyze</button>
            <div id="fileSpinner" class="spinner"></div>
        </form>

        {% if message %}
        <h3>Result:</h3>
        <p>{{ message }}</p>
        {% endif %}

        <h2><i class="fas fa-link"></i> URL Threat Detection</h2>
        <form id="urlForm" method="post" action="/tool7/predict" onsubmit="showSpinner('urlForm', 'urlSpinner')">
            <label for="url">Enter URL:</label>
            <input type="text" name="url" required>
            <button type="submit"><i class="fas fa-search"></i> Classify</button>
            <div id="urlSpinner" class="spinner"></div>
        </form>

        {% if predicted_class %}
            <div class="result-box {{ predicted_class.lower() }}">
                <p><strong>URL:</strong> {{ input_url }}</p>
                <p><strong>Predicted Class:</strong> {{ predicted_class }}</p>
            </div>
        {% endif %}
    </div>

</body>
</html>
