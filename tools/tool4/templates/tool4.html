<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Detection and Translation</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
     /* ==================== PREMIUM MODERN FORM PAGE ==================== */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #312e81 100%);
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

.container {
    max-width: 620px;
    width: 100%;
    background: rgba(255, 255, 255, 0.09);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    box-shadow: 0 25px 70px rgba(0, 0, 0, 0.5);
    padding: 50px 45px;
    border: 1px solid rgba(96, 165, 250, 0.25);
    transition: all 0.4s ease;
}

.container:hover {
    transform: translateY(-8px);
    box-shadow: 0 35px 80px rgba(0, 0, 0, 0.6);
}

/* Heading */
h1, h2 {
    text-align: center;
    font-size: 2.4rem;
    font-weight: 800;
    background: linear-gradient(90deg, #bae6fd, #c4d0ff, #e0bbff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 35px;
}

/* Form Controls */
.form-control {
    width: 100%;
    padding: 16px 20px;
    background: rgba(15, 23, 42, 0.85);
    border: 1px solid rgba(148, 163, 184, 0.4);
    border-radius: 14px;
    color: #e2e8f0;
    font-size: 1.05rem;
    transition: all 0.3s ease;
    margin-bottom: 20px;
}

.form-control:focus {
    outline: none;
    border-color: #60a5fa;
    box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
}

/* Button */
.btn-primary {
    width: 100%;
    background: linear-gradient(90deg, #ec4899, #db2777);
    color: white;
    padding: 16px 24px;
    font-size: 1.15rem;
    font-weight: 700;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.4s ease;
    margin-top: 10px;
    box-shadow: 0 10px 30px rgba(236, 72, 153, 0.4);
}

.btn-primary:hover {
    transform: translateY(-4px);
    box-shadow: 0 15px 40px rgba(236, 72, 153, 0.6);
    background: linear-gradient(90deg, #db2777, #be185d);
}

/* Result Section */
.result-section {
    margin-top: 40px;
    padding-top: 30px;
    border-top: 1px solid rgba(148, 163, 184, 0.3);
    text-align: center;
}

.result-section h4 {
    color: #bae6fd;
    font-size: 1.4rem;
    margin-bottom: 15px;
}

/* Responsive */
@media (max-width: 768px) {
    .container {
        padding: 35px 25px;
        margin: 20px auto;
    }
    
    h1, h2 {
        font-size: 2.1rem;
    }
}

@media (max-width: 480px) {
    .container {
        padding: 30px 20px;
    }
    
    h1, h2 {
        font-size: 1.9rem;
    }
}
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Language Detection and Translation</h1>
        <form method="post" action="/tool4/trans" class="mt-4">
            <div class="form-group">
                <label for="text">Enter Text</label>
                <textarea class="form-control" id="text" name="text" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label for="target_lang">Select Target Language</label>
                <select class="form-control" id="target_lang" name="target_lang" required>
                    {% for lang_code, lang_name in languages.items() %}
                        <option value="{{ lang_code }}">{{ lang_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Translate</button>
        </form>
        {% if translation %}
            <div class="result-section mt-4">
                <h4>Detected Language: {{ detected_lang }}</h4>
                <h4>Translation: {{ translation }}</h4>
            </div>
        {% endif %}
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
