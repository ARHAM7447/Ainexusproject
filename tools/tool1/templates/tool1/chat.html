<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<style>
  /* ==================== PREMIUM VOICE ASSISTANT - Modern & Beautiful ==================== */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #312e81 100%);
    color: #e0f2fe;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
}

/* Subtle animated background glow */
body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 30%, rgba(96, 165, 250, 0.15), transparent 70%);
    animation: glowPulse 15s ease-in-out infinite;
    z-index: -1;
}

@keyframes glowPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
}

.container {
    text-align: center;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(20px);
    padding: 50px 40px;
    border-radius: 28px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    width: 90%;
    max-width: 460px;
    border: 1px solid rgba(96, 165, 250, 0.3);
    animation: fadeInScale 0.8s ease;
}

@keyframes fadeInScale {
    from {
        opacity: 0;
        transform: scale(0.85) translateY(30px);
    }
    to {
        opacity: 1;
        transform: scale(1) translateY(0);
    }
}

h1 {
    font-size: 2.6rem;
    font-weight: 800;
    background: linear-gradient(90deg, #bae6fd, #c4d0ff, #e0bbff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    text-shadow: 0 4px 20px rgba(96, 165, 250, 0.3);
}

.subtitle {
    color: #94a3b8;
    font-size: 1.1rem;
    margin-bottom: 40px;
}

/* Mic Button - Eye-catching */
.mic-wrapper {
    margin: 30px 0;
    position: relative;
}

.mic-btn {
    width: 110px;
    height: 110px;
    background: radial-gradient(circle at 30% 30%, #ff416c, #ff4b2b, #e11d48);
    color: white;
    font-size: 3.2rem;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    outline: none;
    box-shadow: 
        0 0 40px rgba(255, 75, 43, 0.6),
        0 10px 30px rgba(0, 0, 0, 0.5);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse-mic 2.2s infinite ease-in-out;
}

.mic-btn:hover {
    transform: scale(1.12);
    box-shadow: 
        0 0 60px rgba(255, 75, 43, 0.8),
        0 15px 40px rgba(0, 0, 0, 0.6);
}

.mic-btn:active {
    transform: scale(0.92);
    background: #c026d3;
}

@keyframes pulse-mic {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
}

/* Listening Indicator */
.listening {
    margin-top: 15px;
    color: #60a5fa;
    font-weight: 600;
    font-size: 1.1rem;
    animation: listeningAnim 1.5s infinite;
}

@keyframes listeningAnim {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
}

/* Conversation History */
#conversation-history {
    margin-top: 35px;
    font-size: 1.02rem;
    color: #e2e8f0;
    max-height: 320px;
    overflow-y: auto;
    background: rgba(15, 23, 42, 0.7);
    padding: 20px;
    border-radius: 16px;
    border: 1px solid rgba(96, 165, 250, 0.2);
    box-shadow: inset 0 4px 15px rgba(0, 0, 0, 0.3);
}

.history-entry {
    margin-bottom: 18px;
    padding: 16px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.08);
    text-align: left;
}

.user-input {
    font-weight: 600;
    color: #f472b6;
    margin-bottom: 6px;
}

.ai-response {
    color: #bae6fd;
    line-height: 1.5;
}

/* Scrollbar Styling */
#conversation-history::-webkit-scrollbar {
    width: 6px;
}

#conversation-history::-webkit-scrollbar-thumb {
    background: rgba(96, 165, 250, 0.5);
    border-radius: 10px;
}

/* Responsive */
@media (max-width: 600px) {
    .container {
        padding: 35px 25px;
        width: 95%;
    }

    .mic-btn {
        width: 95px;
        height: 95px;
        font-size: 2.6rem;
    }

    h1 {
        font-size: 2.2rem;
    }
}
</style>

<body>
    <div class="container">
        <h1>AI Voice Assistant</h1>
        <div class="mic-wrapper">
            <button id="start-record-btn" class="mic-btn">🎤 Speak Now</button>
        </div>
        <div id="response-text"></div>

        <div id="conversation-history">
            <!-- Conversation history will be dynamically updated here -->
        </div>
    </div>

    <!-- Include JavaScript for microphone interaction and speech synthesis -->
    <script src="/static/script.js"></script>
</body>

<script>
    const startRecordBtn = document.getElementById('start-record-btn');
    const responseText = document.getElementById('response-text');
    const conversationHistory = document.getElementById('conversation-history');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();

    if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
        responseText.innerHTML = 'Speech Recognition API not supported in this browser.';
    }

    recognition.onstart = function() {
        responseText.innerHTML = 'Listening...';
    };

    recognition.onspeechend = function() {
        recognition.stop();
    };

    recognition.onresult = function(event) {
        const userInput = event.results[0][0].transcript;
        responseText.innerHTML = `You said: "${userInput}"`;

        // Send user input to Flask server
        fetch('/tool1/process_voice', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ user_input: userInput }),
        })
        .then(response => response.json())
        .then(data => {
            const aiResponse = data.response;
            responseText.innerHTML = `AI Response: "${aiResponse}"`;

            // Update conversation history with both user input and AI response
            updateConversationHistory(data.conversation_history);

            speakResponse(aiResponse);
        })
        .catch(error => {
            responseText.innerHTML = 'Error processing request.';
        });
    };

    startRecordBtn.addEventListener('click', () => {
        recognition.start();
    });

    // Update the conversation history section
    function updateConversationHistory(history) {
        conversationHistory.innerHTML = '';  // Clear existing history

        history.forEach(entry => {
            const historyEntry = document.createElement('div');
            historyEntry.classList.add('history-entry');

            const userInput = document.createElement('div');
            userInput.classList.add('user-input');
            userInput.innerHTML = `You: ${entry.user}`;

            const aiResponse = document.createElement('div');
            aiResponse.classList.add('ai-response');
            aiResponse.innerHTML = `AI: ${entry.ai}`;

            historyEntry.appendChild(userInput);
            historyEntry.appendChild(aiResponse);

            conversationHistory.appendChild(historyEntry);
        });
    }

    // Use the SpeechSynthesis API to speak the AI response
    function speakResponse(text) {
        const synth = window.speechSynthesis;
        const utterance = new SpeechSynthesisUtterance(text);
        synth.speak(utterance);
    }
</script>
</html>
