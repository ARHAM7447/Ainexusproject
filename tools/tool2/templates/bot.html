<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat With Ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>
<style>
   /* ==================== PREMIUM MODERN AI CHAT DASHBOARD ==================== */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    overflow: hidden;
    transition: background 0.4s ease;
}

/* ==================== SIDEBAR ==================== */
.sidebar {
    width: 280px;
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(16px);
    color: white;
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid rgba(96, 165, 250, 0.2);
    transition: all 0.4s ease;
}

.sidebar h3 {
    text-align: center;
    margin-bottom: 25px;
    font-size: 1.5rem;
    font-weight: 700;
    background: linear-gradient(90deg, #60a5fa, #c4d0ff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}

.profile-image {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    margin: 0 auto 20px;
    display: block;
    border: 4px solid #60a5fa;
    box-shadow: 0 0 25px rgba(96, 165, 250, 0.4);
    transition: transform 0.4s ease;
}

.profile-image:hover {
    transform: scale(1.08);
}

.sidebar ul {
    list-style: none;
    flex: 1;
    margin-top: 20px;
}

.sidebar ul li {
    padding: 14px 20px;
    margin-bottom: 8px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 500;
}

.sidebar ul li:hover {
    background: rgba(96, 165, 250, 0.25);
    transform: translateX(8px);
}

.sidebar button {
    background: linear-gradient(90deg, #ef4444, #dc2626);
    border: none;
    color: white;
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    margin-top: 20px;
    transition: all 0.3s ease;
}

.sidebar button:hover {
    background: linear-gradient(90deg, #dc2626, #b91c1c);
    transform: translateY(-2px);
}

/* ==================== MAIN CONTENT ==================== */
.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 25px;
    background: rgba(15, 23, 42, 0.6);
}

h1, h4 {
    text-align: center;
    color: #bae6fd;
    margin-bottom: 20px;
    font-weight: 700;
}

h1 {
    font-size: 2.4rem;
}

/* Chat Box */
.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 25px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 20px;
    border: 1px solid rgba(96, 165, 250, 0.2);
    margin-bottom: 20px;
    box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.3);
}

.chat-box p {
    padding: 14px 18px;
    background: rgba(96, 165, 250, 0.15);
    border-radius: 18px;
    margin-bottom: 15px;
    max-width: 85%;
    word-wrap: break-word;
    line-height: 1.5;
}

.chat-box .user-input {
    background: rgba(34, 197, 94, 0.2);
    margin-left: auto;
    text-align: right;
}

/* Input Area */
.input-area {
    display: flex;
    position: relative;
    background: rgba(15, 23, 42, 0.8);
    border-radius: 9999px;
    padding: 8px;
    border: 1px solid rgba(96, 165, 250, 0.3);
}

.input-area input {
    flex: 1;
    padding: 18px 25px;
    border: none;
    outline: none;
    background: transparent;
    color: #e2e8f0;
    font-size: 1.05rem;
}

.input-area button {
    width: 55px;
    height: 55px;
    border: none;
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    color: white;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
}

.input-area button:hover {
    transform: scale(1.1);
    background: linear-gradient(90deg, #2563eb, #3b82f6);
    box-shadow: 0 0 20px rgba(96, 165, 250, 0.6);
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    z-index: 2000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(8px);
}

.modal-content {
    background: #1e2937;
    margin: 8% auto;
    padding: 0;
    border-radius: 20px;
    width: 90%;
    max-width: 480px;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
}

.modal-header {
    background: linear-gradient(90deg, #22c55e, #16a34a);
    color: white;
    padding: 18px 25px;
    font-size: 1.3rem;
    font-weight: 600;
}

.modal-body {
    padding: 25px;
    color: #e2e8f0;
}

.modal-footer {
    padding: 15px 25px;
    background: #1e2937;
    text-align: right;
    border-top: 1px solid rgba(148, 163, 184, 0.2);
}

/* Theme Options */
.theme-option {
    padding: 14px;
    margin: 8px 0;
    border-radius: 12px;
    background: rgba(59, 130, 246, 0.2);
    color: white;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
}

.theme-option:hover {
    background: rgba(59, 130, 246, 0.4);
    transform: translateX(8px);
}

/* Responsive */
@media (max-width: 768px) {
    .sidebar {
        width: 240px;
    }
    
    .main-content {
        padding: 15px;
    }
}

@media (max-width: 600px) {
    body {
        flex-direction: column;
    }
    
    .sidebar {
        width: 100%;
        height: auto;
        padding: 20px;
    }
    
    .chat-box {
        height: 50vh;
    }
}
</style>
<body>

<div class="sidebar">
    <h3>Chat with Ai</h3>
    
    <p>---------------------------------------------</p>
    <div class="chat-list">
        <ul id="chat-list">
            <!-- Dynamic chat list rendering -->
        </ul>
    </div>
    <p>----------------------------------------------</p>
    <div>
        <button onclick="createNewChat()">New Chat</button>
        <button onclick="deleteSelectedChats()">Delete Selected Chats</button>
        <button onclick="openSettings()">Settings</button>
    </div>
</div>

<div class="main-content">
    <h1>Chats BY Arham Khan</h1>
    <h4>How may I help Today?</h4>
    <hr>
    <div class="chat-box" id="chat-box">
        <p>Welcome to the chat! Start a conversation.</p>
    </div>

    <!-- Loading Spinner -->
    <div id="loading-spinner" style="display: none; text-align: center; padding: 20px;">
        <i class="fas fa-spinner fa-spin" style="font-size: 24px; color: #3498db;"></i>
        <p>Loading...</p>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your query...">
        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>



<!-- The Modal -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span class="close" onclick="closeSettings()">&times;</span>
            <h2>Settings</h2>
        </div>
        <div class="modal-body">
            <h3>Choose Theme Color</h3>
            <div class="theme-option" onclick="changeTheme('default')">Default</div>
            <div class="theme-option" onclick="changeTheme('dark')">Dark</div>
            <div class="theme-option" onclick="changeTheme('light')">Light</div>
            <div class="theme-option" onclick="changeTheme('blue')">Blue</div>
            <hr>
            <h3>Zoom</h3>
            <button onclick="zoomIn()">Zoom In</button>
            <button onclick="zoomOut()">Zoom Out</button>
        </div>
        <div class="modal-footer">
            <button onclick="closeSettings()">Close</button>
        </div>
    </div>
</div>
<script>
   let activeChatId = 1;  // Default active chat ID is the first one
let currentZoom = 1;   // Default zoom level

function loadChats() {
    fetch('/tool2/get_chats')  // Updated URL
    .then(response => response.json())
    .then(data => {
        const chatList = document.getElementById('chat-list');
        chatList.innerHTML = '';  // Clear current chat list

        if (data && data.chats) {
            data.chats.forEach(chat => {
                const li = document.createElement('li');
                li.textContent = chat.name;
                li.setAttribute('data-id', chat.id);
                li.onclick = () => selectChat(chat.id);
                if (chat.id === activeChatId) {
                    li.style.backgroundColor = '#e74c3c';  // Highlight active chat
                }
                chatList.appendChild(li);
            });
        }
    })
    .catch(error => console.error('Error:', error));
}

function selectChat(chatId) {
    activeChatId = chatId;
    loadChatHistory(chatId);
    loadChats();  // Refresh chat list to update active chat highlight
}

function loadChatHistory(chatId) {
    fetch(`/tool2/get_chat_history?chat_id=${chatId}`)  // Updated URL
    .then(response => response.json())
    .then(data => {
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML = '';  // Clear current chat history

        if (data && data.messages) {
            data.messages.forEach(message => {
                const messageElem = document.createElement('pre');
                messageElem.textContent = message.text;
                chatBox.appendChild(messageElem);
            });
        }
    })
    .catch(error => console.error('Error:', error));
}

function createNewChat() {
    const chatName = prompt("Enter new chat name:");
    if (chatName) {
        fetch('/tool2/new_chat', {  // Updated URL
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_name: chatName })
        })
        .then(response => response.json())
        .then(data => {
            loadChats();  // Refresh chat list
            selectChat(data.chat_id);  // Switch to the new chat
        })
        .catch(error => console.error('Error:', error));
    }
}

function sendMessage() {
    const userInput = document.getElementById('user-input').value;
    if (userInput.trim() === '') return;

    const chatBox = document.getElementById('chat-box');
    const userMessage = document.createElement('pre');
    userMessage.textContent = `User: ${userInput}`;
    chatBox.appendChild(userMessage);

    document.getElementById('user-input').value = '';

    // Show loading spinner
    document.getElementById('loading-spinner').style.display = 'block';

    fetch('/tool2/generate', {  // Updated URL
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ input: userInput, chat_id: activeChatId })
    })
    .then(response => response.json())
    .then(data => {
        const aiMessage = document.createElement('pre');
        aiMessage.textContent = `AI: ${data.response}`;
        chatBox.appendChild(aiMessage);
        chatBox.scrollTop = chatBox.scrollHeight;

        // Hide loading spinner
        document.getElementById('loading-spinner').style.display = 'none';
    })
    .catch(error => {
        console.error('Error:', error);
        // Hide loading spinner in case of error
        document.getElementById('loading-spinner').style.display = 'none';
    });
}

function deleteSelectedChats() {
    if (confirm('Are you sure you want to delete the selected chat?')) {
        fetch('/tool2/delete_chat', {  // Updated URL
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: activeChatId })
        })
        .then(response => response.json())
        .then(data => {
            loadChats();  // Refresh chat list
            document.getElementById('chat-box').innerHTML = '';  // Clear chat history
        })
        .catch(error => console.error('Error:', error));
    }
}

function openSettings() {
    document.getElementById('settingsModal').style.display = 'block';
}

function closeSettings() {
    document.getElementById('settingsModal').style.display = 'none';
}

function changeTheme(theme) {
    switch (theme) {
        case 'dark':
            document.body.style.backgroundColor = '#34495e';
            document.querySelector('.sidebar').style.backgroundColor = '#2c3e50';
            document.querySelector('.sidebar').style.color = 'white';
            document.querySelector('.chat-box').style.backgroundColor = '#2c3e50';
            document.querySelector('.input-area input').style.backgroundColor = '#34495e';
            document.querySelector('.input-area input').style.color = '#ecf0f1';
            document.querySelector('.input-area button').style.backgroundColor = '#3498db';
            break;
        case 'light':
            document.body.style.backgroundColor = '#ecf0f1';
            document.querySelector('.sidebar').style.backgroundColor = '#ffffff';
            document.querySelector('.chat-box').style.backgroundColor = '#ffffff';
            document.querySelector('.input-area input').style.backgroundColor = '#ffffff';
            document.querySelector('.input-area input').style.color = '#2c3e50';
            document.querySelector('.input-area button').style.backgroundColor = '#3498db';
            break;
        case 'blue':
            document.body.style.backgroundColor = '#e0f7fa';
            document.querySelector('.sidebar').style.backgroundColor = '#0097a7';
            document.querySelector('.chat-box').style.backgroundColor = '#b3e5fc';
            document.querySelector('.input-area input').style.backgroundColor = '#b3e5fc';
            document.querySelector('.input-area input').style.color = '#006064';
            document.querySelector('.input-area button').style.backgroundColor = '#0097a7';
            break;
        default:
            document.body.style.backgroundColor = '#ecf0f1';
            document.querySelector('.sidebar').style.backgroundColor = '#2c3e50';
            document.querySelector('.chat-box').style.backgroundColor = '#ffffff';
            document.querySelector('.input-area input').style.backgroundColor = '#ffffff';
            document.querySelector('.input-area input').style.color = '#2c3e50';
            document.querySelector('.input-area button').style.backgroundColor = '#3498db';
    }
}

function zoomIn() {
    currentZoom += 0.1;
    document.body.style.transform = `scale(${currentZoom})`;
}

function zoomOut() {
    currentZoom = Math.max(0.5, currentZoom - 0.1);
    document.body.style.transform = `scale(${currentZoom})`;
}

window.onload = loadChats;

</script>
</body>
</html>
